%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[192.168.10.0/24]"
    EXTERNAL_NET: "!$HOME_NET"

default-log-dir: /var/log/suricata
default-rule-path: /etc/suricata/rules

rule-files:
  - local.rules

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            payload: yes
            packet: no
            metadata: yes
        - http
        - dns
        - flow

  - fast:
      enabled: yes
      filename: fast.log
