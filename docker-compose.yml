services:
  suricata:
    build:
      context: ./suricata
    image: project-radiant-suricata:latest
    container_name: project-radiant-suricata
    env_file:
      - .env
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    command:
      - suricata
      - -c
      - /etc/suricata/suricata.yaml
      - -i
      - ${SURICATA_CAPTURE_IFACE}
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/etc/suricata/rules:ro
      - ./logs/suricata:/var/log/suricata
    restart: unless-stopped
