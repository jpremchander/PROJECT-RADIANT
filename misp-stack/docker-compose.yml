version: "3.8"

services:
  db:
    # mirror.gcr.io is Google's read-through cache for Docker Hub (avoids Hub blocks)
    image: mirror.gcr.io/library/mariadb:10.11
    container_name: misp-db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-misp}
      MYSQL_USER: ${MYSQL_USER:-misp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-misp}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-misproot}
    volumes:
      - misp-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    networks:
      - misp

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    container_name: misp-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - misp

  misp-core:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: misp-core
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "443:443"
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-misp}
      MYSQL_USER: ${MYSQL_USER:-misp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-misp}
      REDIS_FQDN: redis
      MISP_BASEURL: ${MISP_BASEURL:-http://192.168.50.100:8090}
      MISP_UUID: ${MISP_UUID:-}
      MISP_ORG: ${MISP_ORG:-RADIANT}
      MISP_HOST_ORG_ID: "1"
      MISP_EMAIL: ${MISP_EMAIL:-admin@radiant.local}
      SECURITY_SALT: ${SECURITY_SALT:-Th1sIsAR4nd0mS4ltF0rR4d14ntPr0j3ct}
      WORKERS: "1"
    volumes:
      - misp-data:/var/www/MISP/app/files
      - ../logs/misp:/var/www/MISP/app/tmp/logs
    restart: unless-stopped
    networks:
      - misp

  misp-modules:
    image: ghcr.io/misp/misp-docker/misp-modules:latest
    container_name: misp-modules
    environment:
      REDIS_BACKEND: redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "245"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - misp

networks:
  misp:
    driver: bridge

volumes:
  misp-db:
  misp-data:
